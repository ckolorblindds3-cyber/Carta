<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti</title>

<style>

body{
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#f9d5e5,#fceabb);
text-align:center;
margin:0;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h1{
margin-bottom:10px;
font-size:32px;
}

.mensaje{
font-size:18px;
color:#555;
margin-bottom:25px;
}

.audio-box{
background:#f7f7f7;
padding:20px;
border-radius:10px;
margin-bottom:30px;
}

audio{
width:100%;
margin-top:10px;
}

.carta-img{
width:100%;
max-width:500px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
margin-top:15px;
}

.buttons{
margin-top:20px;
}

button{
padding:12px 25px;
margin:10px;
font-size:16px;
border:none;
background:#ff4d6d;
color:white;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#e63956;
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="container">

<h1>Para Eli❤️</h1>

<div class="audio-box">
<p class="mensaje">
Grabé estas canciones para ti porque sé que te gustan.  
Con mucho cariño.
</p>

<audio controls>
<source src="Audio_2026_03_16_01_08_32.mp3" type="audio/mpeg">
Tu navegador no soporta audio.
</audio>

<div class="buttons">
<a href="Audio_2026_03_16_01_08_32.mp3" download>
<button>Descargar Canciones</button>
</a>
</div>

</div>

<h2>Espero puedas leer esto</h2>

<img src="carta.jpg" class="carta-img">

<div class="buttons">
<a href="Para Liz 16 Marzo 26.pdf" download>
<button>Descargar carta</button>
</a>
</div>

</div>

</body>
</html>
