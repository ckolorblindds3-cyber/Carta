<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Eli</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Segoe UI',sans-serif;
background:black;
color:white;
text-align:center;
overflow:hidden;
}

/* contenedor */

.container{
position:relative;
z-index:2;
max-width:600px;
margin:auto;
padding:40px 20px;
}

h1{
font-size:28px;
margin-bottom:15px;
}

.mensaje{
font-size:16px;
color:#ccc;
margin-bottom:25px;
}

/* reproductor */

.player{
display:flex;
align-items:center;
justify-content:center;
gap:15px;
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:12px;
margin-bottom:25px;
}

.playBtn{
background:#ff1a4d;
border:none;
color:white;
font-size:18px;
width:50px;
height:50px;
border-radius:50%;
cursor:pointer;
transition:0.3s;
}

.playBtn:hover{
background:#ff4d6d;
}

/* mensaje bloqueado */

.locked{
margin-top:30px;
font-size:18px;
color:#ff4d6d;
}

/* corazones */

.heart{
position:fixed;
top:-10px;
color:#ff4d6d;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>Para Eli</h1>

<p class="mensaje">
Algo especial sigue aquí... pero tendrás que esperar 💔
</p>

<div class="player">
<button class="playBtn" onclick="toggleAudio()">▶</button>
<span>Canciones para ti</span>
</div>

<audio id="audio">
<source src="Audio_2026_03_16_01_08_32.mp3" type="audio/mpeg">
</audio>

<p class="locked">
No disponible<br>
Volver el 1 de abril
</p>

</div>

<script>

let audio = document.getElementById("audio");
let btn = document.querySelector(".playBtn");

function toggleAudio(){

if(audio.paused){
audio.play();
btn.innerHTML="⏸";
startHearts();
}else{
audio.pause();
btn.innerHTML="▶";
}

}

/* autoplay silencioso */

window.addEventListener("load",()=>{
audio.play().then(()=>{
btn.innerHTML="⏸";
startHearts();
}).catch(()=>{});
});

/* lluvia de corazones */

function startHearts(){
setInterval(createHeart, 300);
}

function createHeart(){

let heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML = "❤";

heart.style.left = Math.random() * 100 + "vw";
heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

</script>

</body>
</html>
