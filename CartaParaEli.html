<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>...</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at center, #050505, #000);
color:white;
text-align:center;
overflow:hidden;
perspective:1000px;
}

/* contenedor */

.container{
position:relative;
z-index:2;
max-width:700px;
margin:auto;
padding:80px 20px;
transform:rotateX(8deg);
}

/* fecha principal glitch */

.fecha-main{
font-size:60px;
font-weight:bold;
color:#00f0ff;
text-shadow:
0 0 20px #00f0ff,
0 0 40px #00f0ff,
0 0 80px rgba(0,240,255,0.8);
animation:glitchFade 3s infinite;
margin-bottom:30px;
}

/* glitch aparece/desaparece */

@keyframes glitchFade{
0%{opacity:1; transform:translate(0);}
20%{opacity:0.2; transform:translate(-3px,2px);}
40%{opacity:1; transform:translate(3px,-2px);}
60%{opacity:0.3; transform:translate(-2px,-2px);}
80%{opacity:1; transform:translate(2px,2px);}
100%{opacity:1; transform:translate(0);}
}

/* mensajes */

.mensaje{
font-size:22px;
margin-bottom:20px;
color:#ddd;
text-shadow:0 0 10px rgba(255,255,255,0.2);
}

.extra{
font-size:18px;
color:#ff4d6d;
margin-bottom:40px;
text-shadow:0 0 15px rgba(255,0,80,0.7);
}

/* video */

.video-box{
margin-top:30px;
}

.video-box p{
margin-bottom:15px;
font-size:18px;
color:#fff;
text-shadow:0 0 10px rgba(255,255,255,0.3);
}

iframe{
width:100%;
height:315px;
border-radius:12px;
box-shadow:0 0 30px rgba(0,240,255,0.4);
border:none;
}

/* fecha final */

.footer{
position:absolute;
bottom:20px;
width:100%;
font-size:14px;
color:#888;
text-shadow:0 0 10px rgba(255,255,255,0.2);
}

/* corazones */

.heart{
position:fixed;
top:-10px;
color:#ff1a4d;
font-size:18px;
animation:fall linear forwards;
opacity:0.8;
text-shadow:0 0 15px rgba(255,0,80,0.8);
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<div class="fecha-main">
10/abril/2021
</div>

<p class="mensaje">
Hubo algo especial aquí…<br>
pero lo arruiné 💔
</p>

<p class="extra">
Lo siento mucho por el tiempo que te hice perder 💔
</p>

<div class="video-box">
<p>esta vez es de mi para ti...</p>

<!-- REEMPLAZA VIDEO_URL -->
<iframe src="VIDEO_URL" allowfullscreen></iframe>

</div>

</div>

<!-- audio -->
<audio autoplay loop>
<source src="Audio_2026_03_16_01_08_32.mp3" type="audio/mpeg">
</audio>

<div class="footer">
24 de Mayo de 2025
</div>

<script>

/* lluvia corazones */

setInterval(createHeart, 180);

function createHeart(){

let heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML = "💔";

heart.style.left = Math.random() * 100 + "vw";
heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
heart.style.fontSize = (Math.random() * 10 + 16) + "px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

</script>

</body>
</html>
