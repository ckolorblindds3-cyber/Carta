<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error 404</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at center, #050505, #000000);
color:white;
text-align:center;
overflow:hidden;
perspective:1000px;
}

/* contenedor 3D */

.container{
position:relative;
z-index:2;
max-width:600px;
margin:auto;
padding:80px 20px;
transform:rotateX(10deg);
}

/* 404 glitch */

.glitch{
font-size:90px;
font-weight:bold;
position:relative;
color:#ff1a4d;
text-shadow:
0 0 20px #ff004c,
0 0 40px #ff004c,
0 0 80px rgba(255,0,80,0.8);
animation:glitch 2s infinite;
}

@keyframes glitch{
0%{transform:translate(0);}
20%{transform:translate(-2px,2px);}
40%{transform:translate(-2px,-2px);}
60%{transform:translate(2px,2px);}
80%{transform:translate(2px,-2px);}
100%{transform:translate(0);}
}

/* subtítulo */

.sub{
font-size:20px;
color:#aaa;
margin-bottom:30px;
letter-spacing:2px;
}

/* mensaje */

.mensaje{
font-size:22px;
margin-bottom:25px;
color:#ddd;
text-shadow:0 0 10px rgba(255,255,255,0.2);
}

.extra{
font-size:17px;
color:#ff4d6d;
margin-bottom:30px;
text-shadow:0 0 15px rgba(255,0,80,0.6);
}

/* fecha glitch */

.fecha{
font-size:20px;
color:#00f0ff;
text-shadow:
0 0 10px #00f0ff,
0 0 20px #00f0ff,
0 0 40px rgba(0,240,255,0.7);
transition:0.3s;
}

/* corazones rotos */

.heart{
position:fixed;
top:-10px;
color:#ff1a4d;
font-size:18px;
animation:fall linear forwards;
opacity:0.8;
text-shadow:0 0 15px rgba(255,0,80,0.8);
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<div class="glitch">404</div>

<p class="sub">PÁGINA NO ENCONTRADA</p>

<p class="mensaje">
Hubo algo especial aquí…<br>
pero lo arruiné 💔
</p>

<p class="extra">
Lo siento mucho por el tiempo que te hice perder 💔
</p>

<p class="fecha" id="fecha">
Volver el 10 de abril de 2021
</p>

</div>

<!-- audio oculto -->
<audio autoplay loop>
<source src="Audio_2026_03_16_01_08_32.mp3" type="audio/mpeg">
</audio>

<script>

/* glitch de fecha */

let fecha = document.getElementById("fecha");

setInterval(()=>{

// glitch raro
fecha.innerHTML = "Volver el 10 de anril de 2026";
fecha.style.color = "#ff1a4d";

setTimeout(()=>{
fecha.innerHTML = "Volver el 10 de abril de 2021";
fecha.style.color = "#00f0ff";
},400);

},4000);

/* lluvia constante de corazones rotos */

setInterval(createHeart, 180);

function createHeart(){

let heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML = "💔";

heart.style.left = Math.random() * 100 + "vw";
heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
heart.style.fontSize = (Math.random() * 10 + 16) + "px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

</script>

</body>
</html>
