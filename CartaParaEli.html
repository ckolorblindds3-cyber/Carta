<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
text-align:center;
margin:0;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
margin-bottom:25px;
}

.pdf-viewer{
width:100%;
height:600px;
border:none;
border-radius:6px;
margin-bottom:20px;
}

audio{
margin-top:20px;
width:100%;
}

.buttons{
margin-top:20px;
}

button{
padding:12px 25px;
margin:10px;
font-size:16px;
border:none;
background:#333;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#555;
}

</style>
</head>

<body>

<div class="container">

<h1>Para ti</h1>

<iframe class="pdf-viewer" src="carta.pdf"></iframe>

<div class="buttons">
<a href="carta.pdf" download>
<button>Descargar carta</button>
</a>
</div>

<h2>Audio</h2>

<audio controls>
<source src="audio.mp3" type="audio/mpeg">
Tu navegador no soporta audio.
</audio>

<div class="buttons">
<a href="audio.mp3" download>
<button>Descargar audio</button>
</a>
</div>

</div>

</body>
</html>
