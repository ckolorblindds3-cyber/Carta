<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error 404</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at center, #0a0a0a, #000000);
color:white;
text-align:center;
overflow:hidden;
}

/* efecto glow */

.container{
position:relative;
z-index:2;
max-width:600px;
margin:auto;
padding:60px 20px;
animation:fadeIn 2s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

h1{
font-size:80px;
color:#ff1a4d;
text-shadow:0 0 20px rgba(255,0,80,0.7);
margin-bottom:10px;
}

.sub{
font-size:20px;
color:#aaa;
margin-bottom:30px;
}

.mensaje{
font-size:20px;
color:#ddd;
margin-bottom:25px;
line-height:1.5;
}

.extra{
font-size:16px;
color:#ff4d6d;
opacity:0.9;
}

/* corazones rotos */

.heart{
position:fixed;
top:-10px;
color:#ff1a4d;
font-size:18px;
animation:fall linear forwards;
opacity:0.8;
text-shadow:0 0 10px rgba(255,0,80,0.6);
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>404</h1>
<p class="sub">Página no encontrada</p>

<p class="mensaje">
Hubo algo especial aquí…<br>
pero lo arruiné 💔
</p>

<p class="extra">
Lo siento mucho por el tiempo que te hice perder 💔
</p>

</div>

<!-- audio oculto -->
<audio autoplay loop>
<source src="Audio_2026_03_16_01_08_32.mp3" type="audio/mpeg">
</audio>

<script>

/* lluvia constante de corazones rotos */

setInterval(createHeart, 200);

function createHeart(){

let heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML = "💔";

heart.style.left = Math.random() * 100 + "vw";
heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
heart.style.fontSize = (Math.random() * 10 + 16) + "px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

</script>

</body>
</html>
