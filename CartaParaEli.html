<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error 404</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Segoe UI',sans-serif;
background:black;
color:white;
text-align:center;
overflow:hidden;
}

/* contenedor */

.container{
position:relative;
z-index:2;
max-width:600px;
margin:auto;
padding:40px 20px;
}

h1{
font-size:60px;
color:#ff4d6d;
margin-bottom:10px;
}

.sub{
font-size:20px;
color:#aaa;
margin-bottom:25px;
}

.mensaje{
font-size:18px;
color:#ddd;
margin-bottom:30px;
}

/* reproductor gris */

.player{
display:flex;
align-items:center;
justify-content:center;
gap:15px;
background:#2b2b2b;
padding:15px;
border-radius:12px;
}

.playBtn{
background:#555;
border:none;
color:white;
font-size:18px;
width:50px;
height:50px;
border-radius:50%;
cursor:pointer;
transition:0.3s;
}

.playBtn:hover{
background:#777;
}

/* corazones */

.heart{
position:fixed;
top:-10px;
color:#ff4d6d;
font-size:18px;
animation:fall linear forwards;
opacity:0.8;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>404</h1>
<p class="sub">Página no encontrada</p>

<p class="mensaje">
Hubo algo especial aquí…<br>
pero lo arruiné.
</p>

<div class="player">
<button class="playBtn" onclick="toggleAudio()">▶</button>
<span>Reproducir</span>
</div>

<audio id="audio">
<source src="Audio_2026_03_16_01_08_32.mp3" type="audio/mpeg">
</audio>

</div>

<script>

let audio = document.getElementById("audio");
let btn = document.querySelector(".playBtn");

function toggleAudio(){

if(audio.paused){
audio.play();
btn.innerHTML="⏸";
}else{
audio.pause();
btn.innerHTML="▶";
}

}

/* autoplay intento */

window.addEventListener("load",()=>{
audio.play().then(()=>{
btn.innerHTML="⏸";
}).catch(()=>{});
});

/* lluvia constante de corazones */

setInterval(createHeart, 250);

function createHeart(){

let heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML = "❤";

heart.style.left = Math.random() * 100 + "vw";
heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
heart.style.fontSize = (Math.random() * 10 + 14) + "px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

</script>

</body>
</html>
